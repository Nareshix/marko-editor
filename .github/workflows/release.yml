name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y libgtk-4-dev
      - run: cargo build --release
      - run: mv target/release/Polora target/release/Polora-linux
      - uses: actions/upload-artifact@v4
        with:
          name: polora-linux
          path: target/release/Polora-linux

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: brew install gtk4
      - run: cargo build --release --no-default-features
      - run: mv target/release/Polora target/release/Polora-mac
      - uses: actions/upload-artifact@v4
        with:
          name: polora-mac
          path: target/release/Polora-mac

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-vulkan-loader

      - shell: msys2 {0}
        run: cargo build --release --no-default-features

      - shell: msys2 {0}
        run: |
          mkdir -p release-win
          cp target/release/Polora.exe release-win/

          ldd target/release/Polora.exe \
            | grep -i ucrt64 \
            | awk '{print $3}' \
            | xargs -I{} cp {} release-win/

          cp /ucrt64/bin/vulkan-1.dll release-win/ || true

          mkdir -p release-win/share
          cp -r /ucrt64/share/glib-2.0      release-win/share/
          cp -r /ucrt64/share/icons         release-win/share/
          cp -r /ucrt64/lib/gdk-pixbuf-2.0  release-win/

          mkdir -p release-win/share/glib-2.0/schemas
          cp /ucrt64/share/glib-2.0/schemas/*.xml release-win/share/glib-2.0/schemas/ || true
          glib-compile-schemas release-win/share/glib-2.0/schemas/

          printf '@echo off\r\nset GSK_RENDERER=ngl\r\nstart "" "%%~dp0Polora.exe"\r\n' > release-win/Polora-launch.bat

      - shell: pwsh
        run: Compress-Archive -Path release-win\* -DestinationPath Polora-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: polora-windows
          path: Polora-windows.zip

  publish:
    needs: [build-linux, build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/polora-linux/Polora-linux
            artifacts/polora-mac/Polora-mac
            artifacts/polora-windows/Polora-windows.zip